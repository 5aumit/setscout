<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>SetScout execution prototype</title>
    <style>
      :root { --ink:#e8edf0; --muted:#96a2aa; --canvas:#101719; --panel:#172124; --panel2:#1d292d; --line:#304146; --accent:#90c9b3; --accent-ink:#13382d; --warn:#e4bd75; --danger:#e58d83; --blue:#9fc4db; --paper:#f3f5f2; --shadow:0 18px 50px #0004; font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      [data-theme="light"] { --ink:#182124; --muted:#5e6a70; --canvas:#edf0ed; --panel:#fbfcfa; --panel2:#f2f5f1; --line:#cbd4cf; --accent:#28765d; --accent-ink:#e4f4ea; --warn:#945f18; --danger:#a33d37; --blue:#246884; --shadow:0 18px 50px #69726b24; }
      * { box-sizing:border-box; } body { margin:0; background:var(--canvas); color:var(--ink); min-width:320px; } button, select { font:inherit; } button { cursor:pointer; }
      .app { max-width:1280px; margin:0 auto; padding:26px 28px 110px; } .eyebrow { color:var(--accent); font:700 11px/1.1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing:.12em; text-transform:uppercase; } .brand { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; } .brand strong { font-size:20px; letter-spacing:-.04em; } .brand span { color:var(--muted); font-size:13px; }
      .brief { border:1px solid var(--line); background:var(--panel); padding:14px 16px; display:flex; justify-content:space-between; gap:16px; align-items:start; } .brief p { margin:4px 0 0; font-size:14px; } .brief-meta { white-space:nowrap; color:var(--muted); font:12px ui-monospace, monospace; }
      .hidden { display:none !important; } .execution { margin-top:22px; } .status-line { color:var(--muted); font-size:13px; margin-bottom:15px; } .status-line strong { color:var(--ink); }
      .stage-list { border:1px solid var(--line); background:var(--panel); } .stage { display:grid; grid-template-columns:28px 1fr auto; gap:10px; padding:15px 16px; border-bottom:1px solid var(--line); align-items:start; } .stage:last-child { border-bottom:0; } .stage-index { width:22px; height:22px; border:1px solid var(--line); display:grid; place-items:center; color:var(--muted); font:11px ui-monospace, monospace; } .stage.running .stage-index { background:var(--accent); color:var(--accent-ink); border-color:var(--accent); } .stage.completed .stage-index { color:var(--accent); border-color:var(--accent); } .stage.warning .stage-index { color:var(--warn); border-color:var(--warn); } .stage.failed .stage-index { color:var(--danger); border-color:var(--danger); }
      .stage-title { font-weight:690; font-size:14px; } .stage-note, .activity { color:var(--muted); font-size:13px; margin-top:5px; line-height:1.45; } .stage-state { font:11px ui-monospace, monospace; color:var(--muted); padding-top:3px; } .stage.running .stage-state { color:var(--accent); } .activity { border-left:2px solid var(--accent); padding-left:9px; max-width:620px; } .activity + .activity { margin-top:7px; }
      .run-summary { border:1px solid var(--line); background:var(--panel); padding:15px 16px; margin-bottom:22px; } .summary-head { display:flex; justify-content:space-between; gap:16px; align-items:center; } .summary-stages { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; } .summary-stages span { padding:5px 8px; background:var(--panel2); color:var(--muted); font:11px ui-monospace,monospace; } .limitation { margin-top:14px; color:var(--warn); font-size:13px; }
      .results { margin-top:22px; } .results-head { display:flex; justify-content:space-between; align-items:end; gap:20px; margin-bottom:14px; } h1 { font-size:clamp(28px,4vw,46px); letter-spacing:-.055em; margin:5px 0 0; line-height:.96; max-width:610px; } h2 { font-size:17px; letter-spacing:-.02em; margin:0; } .overview { display:grid; grid-template-columns:1.25fr 1fr 1fr; gap:1px; background:var(--line); border:1px solid var(--line); } .overview article { background:var(--panel); padding:16px; min-height:118px; } .overview p { color:var(--muted); font-size:13px; line-height:1.45; margin:9px 0 0; }
      .cards { margin-top:22px; display:grid; gap:10px; } .card { border:1px solid var(--line); background:var(--panel); } .card-top { padding:18px; display:flex; gap:14px; align-items:start; } .rank { color:var(--accent); font:700 12px ui-monospace, monospace; min-width:28px; padding-top:3px; } .card h3 { margin:0; font-size:17px; letter-spacing:-.025em; } .card p { margin:5px 0 0; color:var(--muted); font-size:13px; line-height:1.45; } .tags { margin:13px 0 0; display:flex; flex-wrap:wrap; gap:6px; } .tag { font-size:11px; padding:4px 6px; border:1px solid var(--line); color:var(--muted); } .tag.meets { color:var(--accent); border-color:color-mix(in srgb,var(--accent),transparent 55%); } .tag.partial { color:var(--warn); border-color:color-mix(in srgb,var(--warn),transparent 55%); } .card-details { border-top:1px solid var(--line); padding:15px 18px; display:grid; grid-template-columns:1fr auto; gap:14px; } .evidence { color:var(--muted); font-size:12px; } .open { border:1px solid var(--accent); color:var(--accent); background:transparent; padding:8px 10px; font-size:12px; white-space:nowrap; }
      .recovery, .empty { margin-top:22px; border:1px solid var(--line); background:var(--panel); padding:26px; max-width:760px; } .recovery h1,.empty h1 { font-size:31px; } .recovery p,.empty p { color:var(--muted); line-height:1.5; max-width:560px; } .actions { display:flex; gap:8px; margin-top:18px; flex-wrap:wrap; } .primary { background:var(--accent); color:var(--accent-ink); border:0; padding:10px 13px; font-weight:700; } .secondary { background:transparent; color:var(--ink); border:1px solid var(--line); padding:10px 13px; }
      /* Direction 1: the ordered Stage sequence is the structural spine. */ .variant-ledger .live-grid { display:grid; grid-template-columns:300px minmax(0,1fr); gap:22px; } .variant-ledger .stage-list { position:sticky; top:16px; } .variant-ledger .stage { grid-template-columns:26px 1fr; } .variant-ledger .stage-state { grid-column:2; padding:0; } .variant-ledger .activity { grid-column:2; }
      /* Direction 2: operational telemetry becomes a thin horizon, not a side rail. */ .variant-signal .signal-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border:1px solid var(--line); margin-bottom:24px; } .variant-signal .signal-cell { background:var(--panel); padding:13px; min-height:78px; } .variant-signal .signal-cell.active { background:var(--accent); color:var(--accent-ink); } .variant-signal .signal-cell .eyebrow { color:inherit; opacity:.75; } .variant-signal .signal-cell b { display:block; margin-top:6px; font-size:14px; } .variant-signal .stage-list { max-width:820px; } .variant-signal .stage:not(.running) .stage-note, .variant-signal .stage:not(.running) .activity { display:none; }
      /* Direction 3: a full execution sheet later folds into a narrow physical record. */ .variant-fold .execution { max-width:950px; margin-left:auto; margin-right:auto; } .variant-fold .stage-list { box-shadow:var(--shadow); } .variant-fold .stage { padding:19px 22px; } .variant-fold .stage.running { background:var(--panel2); } .variant-fold .results { max-width:950px; margin-left:auto; margin-right:auto; } .variant-fold.completed-view .run-summary { max-width:950px; margin:0 auto 24px; } .variant-fold.completed-view .brief { max-width:950px; margin-left:auto; margin-right:auto; } .variant-fold .overview { grid-template-columns:1fr; } .variant-fold .overview article { min-height:auto; }
      .tray { position:fixed; z-index:5; bottom:16px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:8px; padding:9px; border:1px solid var(--line); background:color-mix(in srgb,var(--panel),transparent 4%); box-shadow:var(--shadow); backdrop-filter:blur(12px); } .tray label { color:var(--muted); font:11px ui-monospace,monospace; } .tray select,.tray button { background:var(--panel2); color:var(--ink); border:1px solid var(--line); padding:7px 8px; font-size:12px; } .tray button { min-width:31px; } .stop { color:var(--danger)!important; }
      @media (max-width:720px) { .app { padding:18px 15px 125px; } .brand { margin-bottom:20px; } .brand span { display:none; } .brief { display:block; } .brief-meta { margin-top:10px; } .overview { grid-template-columns:1fr; } .results-head { display:block; } .results-head .eyebrow { margin-top:12px; } .variant-ledger .live-grid { display:block; } .variant-ledger .stage-list { position:static; margin-bottom:20px; } .variant-signal .signal-strip { grid-template-columns:1fr 1fr; } .tray { width:calc(100% - 22px); justify-content:center; flex-wrap:wrap; bottom:9px; } }
      @media (prefers-reduced-motion:no-preference) { .stage.running { animation:enter .28s ease-out; } .results { animation:enter .42s ease-out; } @keyframes enter { from { opacity:.35; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } } }
    </style>
  </head>
  <body data-theme="dark">
    <main class="app" id="app"></main>
    <nav class="tray" aria-label="Prototype controls">
      <label for="variant">direction</label><select id="variant"><option value="ledger">Ledger</option><option value="signal">Signal</option><option value="fold">Fold</option></select>
      <label for="scenario">replay</label><select id="scenario"><option value="success">Successful</option><option value="limited">With limitations</option><option value="failure">Fatal failure</option><option value="cancelled">Cancelled</option><option value="empty">Empty Results</option></select>
      <button id="theme" title="Toggle theme">◐</button><button id="restart" title="Replay from queue">↻</button><button id="stop" class="stop" title="Stop this fake Run">Stop</button>
    </nav>
    <script>
      const stages=['Understand request','Search sources','Gather evidence','Evaluate and rank'];
      const copy={success:['Interpreting the Search Brief','Searching public dataset sources','Checking documentation and licensing','Comparing 6 candidates against 4 requirements'],limited:['Interpreting the Search Brief','Searching public dataset sources','Some source records did not respond','Comparing 4 candidates against 4 requirements'],failure:['Interpreting the Search Brief','Searching public dataset sources','Checking documentation and licensing',''],cancelled:['Interpreting the Search Brief','Searching public dataset sources','',''],empty:['Interpreting the Search Brief','Searching public dataset sources','Checking documentation and licensing','No candidates matched the Search Brief']};
      let params=new URLSearchParams(location.search), variant=params.get('variant')||'ledger', scenario=params.get('scenario')||'success', tick=0, timer;
      const staticView=params.get('static')==='1';
      const app=document.querySelector('#app'), v=document.querySelector('#variant'), s=document.querySelector('#scenario'); v.value=variant;s.value=scenario;
      const setURL=()=>{params.set('variant',variant);params.set('scenario',scenario);history.replaceState({},'',`?${params}`)};
      const escape=x=>x.replaceAll('&','&amp;').replaceAll('<','&lt;');
      function stageMarkup(i) { const status=tick===0?'waiting': tick<=i+1?'waiting':tick===i+2?'running': 'completed'; const bad=scenario==='limited'&&i===2&&tick>4?'warning':scenario==='failure'&&i===3&&tick>5?'failed':status; const detail=bad==='completed'?`${copy[scenario][i]} · ${i===1?'24 sources checked':i===2?'18 evidence items linked':i===3?'6 candidates ranked':'Search Brief ready'}`:bad==='warning'?'Completed with reduced source coverage':bad==='failed'?'Could not produce a reliable comparison':bad==='running'?copy[scenario][i]:''; return `<article class="stage ${bad}"><span class="stage-index">${bad==='completed'?'✓':bad==='warning'?'!':bad==='failed'?'×':i+1}</span><div><div class="stage-title">${stages[i]}</div><div class="stage-note">${detail}</div>${bad==='running'?`<div class="activity">${i===1?'12 sources checked · 8 candidates found':i===2?'Evidence linked to 14 requirement checks':i===3?'Assessing coverage, license, and splits':'Requirements extracted from your brief'}</div>`:''}</div><span class="stage-state">${bad==='waiting'?'Waiting':bad==='completed'?'Completed':bad==='warning'?'Warning':bad==='failed'?'Failed':'Running'}</span></article>` }
      function summary(){const outcome=scenario==='limited'?'Completed with limitations':scenario==='empty'?'Completed · no matching datasets':scenario==='cancelled'?'Cancelled':scenario==='failure'?'Run failed':'Completed'; return `<section class="run-summary"><div class="summary-head"><div><div class="eyebrow">Run summary</div><strong>${outcome}</strong></div><span class="brief-meta">01:42 total</span></div><div class="summary-stages">${stages.map((x,i)=>`<span>${i+1}. ${scenario==='failure'&&i===3?'Failed':scenario==='limited'&&i===2?'Warning':'Completed'}</span>`).join('')}</div>${scenario==='limited'?'<div class="limitation">Result limitation · Two sources could not be reached; coverage may be incomplete.</div>':''}</section>`}
      function cards(){return `<section class="results"><div class="results-head"><div><div class="eyebrow">Results · 6 datasets assessed</div><h1>Three viable choices, each with a different trade-off.</h1></div><span class="brief-meta">Completed just now</span></div>${scenario==='limited'?'<div class="limitation">Coverage and limitations · Two public sources were unavailable during this Run.</div>':''}<section class="overview"><article><div class="eyebrow">Top-ranked</div><h2>Amazon Reviews 2023</h2><p>Strong scale and current documentation; licensing needs review for your use case.</p></article><article><div class="eyebrow">Key trade-off</div><p>IMDB has clearer sentiment labels, but is excluded by your Search Brief.</p></article><article><div class="eyebrow">Coverage</div><p>6 candidates assessed across 24 sources and documentation pages.</p></article></section><div class="cards"><article class="card"><div class="card-top"><span class="rank">#1</span><div><div class="eyebrow">Top-ranked</div><h3>Amazon Reviews 2023</h3><p>Large-scale English review corpus with structured metadata and documented splits.</p><div class="tags"><span class="tag meets">● Meets · scale</span><span class="tag meets">● Meets · English</span><span class="tag partial">◐ Partially meets · license</span><span class="tag">2 known issues</span></div></div></div><div class="card-details"><span class="evidence">Evidence citation available · Dataset card, “Data Fields”</span><button class="open">Open dataset ↗</button></div></article><article class="card"><div class="card-top"><span class="rank">#2</span><div><h3>Yelp Open Dataset</h3><p>Well-documented review data with a focused business domain.</p><div class="tags"><span class="tag meets">● Meets · labels</span><span class="tag partial">◐ Partially meets · scale</span><span class="tag">1 known issue</span></div></div></div></article></div></section>`}
      function terminal(){if(scenario==='failure')return `<section class="recovery"><div class="eyebrow">Recovery view</div><h1>SetScout could not complete the comparison.</h1><p>The evidence needed to evaluate candidates was unavailable. Your Search Brief and completed Stage outcomes are preserved.</p><div class="actions"><button class="primary">Retry search</button><button class="secondary">Edit search</button></div><p class="evidence">Diagnostics · source evidence fetch failed after the configured deadline</p></section>`;if(scenario==='cancelled')return `<section class="empty"><div class="eyebrow">Run cancelled</div><h1>No Results were created.</h1><p>The Run stopped while sources were being searched. Your Search Brief remains available to edit or run again.</p><div class="actions"><button class="primary">Run again</button><button class="secondary">Edit search</button></div></section>`;if(scenario==='empty')return `<section class="empty"><div class="eyebrow">Empty Results</div><h1>No datasets matched this Search Brief.</h1><p>Sources were searched successfully. Try broadening the data type, relaxing a requirement, or removing an exclusion.</p><div class="actions"><button class="primary">Edit search</button></div></section>`;return cards()}
      function render(){const done=tick>=6 || scenario==='cancelled'&&tick>=4; const active=Math.max(0,Math.min(3,tick-2)); const signal=`<section class="signal-strip">${stages.map((x,i)=>`<div class="signal-cell ${!done&&i===active?'active':''}"><div class="eyebrow">${i+1} / 4</div><b>${x}</b></div>`).join('')}</section>`; const queued=tick===0; app.className=`app variant-${variant} ${done?'completed-view':''}`; app.innerHTML=`<header class="brand"><strong>setscout</strong><span>Dataset discovery for research</span></header><section class="brief"><div><div class="eyebrow">Search Brief</div><p>Sentiment classifier · labeled English product reviews · 10k+ examples</p></div><span class="brief-meta">Read-only during Run</span></section>${done?summary():`<section class="execution"><div class="status-line"><strong>${queued?'Queued · position 1':'Stage '+(active+1)+' of 4'}</strong> · ${queued?'Waiting for execution capacity':copy[scenario][active]}</div>${variant==='signal'?signal:''}<div class="live-grid"><section class="stage-list">${stages.map((_,i)=>stageMarkup(i)).join('')}</section>${variant==='ledger'?'<aside><div class="eyebrow">Activity updates</div><h1>Find the dataset before the evidence gets thin.</h1><p class="stage-note">A quiet, stable counter model avoids giving operational details the visual weight of Results.</p></aside>':''}</div></section>`}${done?terminal():''}`; }
      function replay(){clearInterval(timer);tick=0;render();timer=setInterval(()=>{tick++;render();if(tick>=6)clearInterval(timer)},1050)}; v.onchange=()=>{variant=v.value;setURL();render()};s.onchange=()=>{scenario=s.value;setURL();replay()};document.querySelector('#restart').onclick=replay;document.querySelector('#stop').onclick=()=>{scenario='cancelled';s.value=scenario;tick=6;setURL();clearInterval(timer);render()};document.querySelector('#theme').onclick=()=>document.body.dataset.theme=document.body.dataset.theme==='dark'?'light':'dark';staticView?(tick=3,render()):replay();
    </script>
  </body>
</html>
